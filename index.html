<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLICKBADDIE - NAGA MERAH DEWA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; font-family: 'Arial', sans-serif; 
            background: radial-gradient(circle at top, #440000 0%, #1a0000 30%, #000 100%);
            color: #fff; overflow-x: hidden;
        }

        /* NAVBAR DENGAN IKON (KOTAK MERAH ATAS) */
        .navbar {
            background: linear-gradient(to bottom, #660000, #000);
            border-bottom: 2px solid #ff0000;
            padding: 15px 0;
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-menu {
            list-style: none; padding: 0; margin: 0;
            display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;
        }
        .nav-item { 
            text-align: center; color: #fff; text-decoration: none; 
            transition: 0.3s; width: 80px;
        }
        .nav-item i { 
            display: block; font-size: 24px; color: #ff0000; 
            margin-bottom: 5px; text-shadow: 0 0 10px #ff0000;
        }
        .nav-item span { font-size: 10px; font-weight: bold; text-transform: uppercase; display: block; }
        .nav-item:hover { transform: translateY(-5px); }
        .nav-item:hover i { color: gold; text-shadow: 0 0 15px gold; }

        /* BANNER UTAMA (HERO) */
        .hero {
            max-width: 1100px; margin: 20px auto;
            border: 2px solid #ff0000; border-radius: 15px;
            height: 350px; overflow: hidden;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1614294149010-950b698f72c0?q=80&w=2070&auto=format&fit=crop');
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
        }
        .hero-text h1 { font-size: 45px; text-align: center; text-shadow: 0 0 20px #ff0000; margin: 0; }
        .btn-main { background: #ff0000; color: #fff; border: none; padding: 15px 40px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 0 15px #ff0000; }

        /* KOTAK JACKPOT BINGKAI NAGA (KOTAK MERAH BAWAH) */
        .jackpot-wrap {
            max-width: 850px; margin: 60px auto;
            position: relative;
            background: rgba(0,0,0,0.9);
            border-top: 3px solid #ff0000; border-bottom: 3px solid #ff0000;
            padding: 30px; text-align: center;
            box-shadow: inset 0 0 50px #440000, 0 0 25px #ff0000;
        }
        
        /* Gambar Naga Kiri-Kanan */
        .dragon-left, .dragon-right {
            position: absolute; top: -30px; width: 150px; height: auto;
            filter: drop-shadow(0 0 15px #ff0000);
            z-index: 100;
            animation: dragonFloat 2s infinite alternate ease-in-out;
        }
        .dragon-left { left: -80px; transform: scaleX(-1); }
        .dragon-right { right: -80px; }

        @keyframes dragonFloat {
            from { transform: translateY(0) scaleX(-1); }
            to { transform: translateY(-15px) scaleX(-1); }
        }
        /* Penyesuaian animasi naga kanan karena tidak di-flip */
        .dragon-right { animation: dragonFloatRight 2s infinite alternate ease-in-out; }
        @keyframes dragonFloatRight {
            from { transform: translateY(0); }
            to { transform: translateY(-15px); }
        }

        .jackpot-amount { 
            font-size: clamp(35px, 10vw, 65px); 
            font-weight: 900; color: #fff; 
            text-shadow: 0 0 25px #ff0000; 
            font-family: 'Courier New', monospace;
            display: block; margin-top: 10px;
        }

        /* LIVE CHAT */
        .live-chat { position: fixed; bottom: 25px; right: 25px; background: #ff0000; color: #fff; padding: 15px 30px; border-radius: 50px; font-weight: bold; text-decoration: none; box-shadow: 0 0 20px #ff0000; z-index: 1000; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-menu">
        <a href="#" class="nav-item"><i class="fas fa-home"></i><span>Beranda</span></a>
        <a href="#" class="nav-item"><i class="fas fa-fire"></i><span>Hot Games</span></a>
        <a href="#" class="nav-item"><i class="fas fa-gamepad"></i><span>Slot</span></a>
        <a href="#" class="nav-item"><i class="fas fa-futbol"></i><span>Sport</span></a>
        <a href="#" class="nav-item"><i class="fas fa-crown"></i><span>Casino</span></a>
        <a href="#" class="nav-item"><i class="fas fa-fish"></i><span>Fishing</span></a>
        <a href="#" class="nav-item"><i class="fas fa-rocket"></i><span>Crash</span></a>
        <a href="#" class="nav-item"><i class="fas fa-gift"></i><span>Promosi</span></a>
    </div>
</nav>

<div class="hero">
    <div class="hero-text">
        <h1>OMBAK KEMAKMURAN<br><span style="color: gold;">BONUS TERBADASS</span></h1>
        <center><button class="btn-main">MAIN SEKARANG</button></center>
    </div>
</div>

<div class="jackpot-wrap">
    <img src="https://www.pngplay.com/wp-content/uploads/11/Chinese-Dragon-Background-PNG-Image.png" class="dragon-left" alt="Dragon">
    <img src="https://www.pngplay.com/wp-content/uploads/11/Chinese-Dragon-Background-PNG-Image.png" class="dragon-right" alt="Dragon">
    
    <div style="color: #ff0000; font-weight: bold; letter-spacing: 5px; font-size: 20px;">PROGRESSIVE JACKPOT</div>
    <div class="jackpot-amount" id="jackpot-counter">6.093.215.954</div>
</div>

<a href="#" class="live-chat">💬 Live Chat</a>

<script>
    // Script Angka Jackpot Jalan
    let val = 6093215954;
    setInterval(() => {
        val += Math.floor(Math.random() * 2500);
        document.getElementById("jackpot-counter").innerText = val.toLocaleString('id-ID');
    }, 1500);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLICKBADDIE - THE REAL DRAGON SULTAN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- CSS DASAR --- */
        * { box-sizing: border-box; }
        body { 
            margin: 0; font-family: 'Arial', sans-serif; 
            background: radial-gradient(circle at top, #3a0000 0%, #1a0000 30%, #000 100%);
            color: #fff; overflow-x: hidden;
        }

        /* --- 1. HEADER (BRAND & TOMBOL) --- */
        .topbar {
            background: linear-gradient(to bottom, #2a0000, #4d0000, #2a0000);
            border-bottom: 2px solid gold;
            padding: 5px 30px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }
        .brand img { 
            height: 100px; width: auto; margin-left: -20px; 
            filter: drop-shadow(0 0 7px rgba(255, 0, 0, 0.7)); 
        }
        .top-actions { display: flex; gap: 10px; }
        .btn-top { 
            padding: 8px 18px; border-radius: 4px; font-weight: bold; 
            font-size: 12px; text-transform: uppercase; text-decoration: none;
            transition: 0.3s;
        }
        .btn-masuk { background: #1a1a1a; color: gold; border: 1px solid gold; }
        .btn-daftar { 
            background: linear-gradient(to bottom, #fff1a8, #ffd700, #c99600); 
            color: #111; box-shadow: 0 0 12px rgba(255, 215, 0, 0.7); border: none;
        }

        /* --- 2. SLIDER --- */
        .slider-container {
            max-width: 1100px; margin: 20px auto;
            position: relative; overflow: hidden;
            border: 2px solid #ff0000; border-radius: 15px;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.5);
            height: 380px; 
        }
        .slides { display: flex; height: 100%; transition: transform 0.6s ease; }
        .slide { min-width: 100%; height: 100%; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        .prev, .next {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255, 0, 0, 0.7); color: white; border: none;
            width: 45px; height: 45px; cursor: pointer; border-radius: 50%; z-index: 100;
        }
        .next { right: 15px; } .prev { left: 15px; }

        /* --- 3. NAVBAR MENU --- */
        .navbar { background: #111; padding: 15px 0; border-bottom: 2px solid #ff0000; }
        .nav-menu { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; list-style: none; padding: 0; margin: 0; }
        .nav-item { text-align: center; color: #fff; text-decoration: none; width: 85px; transition: 0.3s; }
        .nav-item i { display: block; font-size: 26px; color: #ff0000; margin-bottom: 5px; }
        .nav-item span { font-size: 11px; font-weight: bold; text-transform: uppercase; display: block; }
        .nav-item:hover i { color: gold; text-shadow: 0 0 15px gold; }

        /* --- 4. JACKPOT MEWAH --- */
        .jackpot-wrap {
            max-width: 850px; margin: 50px auto; padding: 30px; text-align: center;
            background: radial-gradient(circle, #4d0000 0%, #1a0000 70%, #000 100%);
            border: 4px solid;
            border-image: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fcf6ba, #aa771c) 1;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
            border-radius: 10px;
        }
        .jackpot-title {
            font-weight: 900; font-size: 26px; letter-spacing: 3px;
            display: flex; align-items: center; justify-content: center; gap: 15px;
            background: linear-gradient(to bottom, #fff1a8, #ffd700, #c99600);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px gold);
        }
        .jackpot-title::before, .jackpot-title::after { content: "🏆"; -webkit-text-fill-color: initial; }
        .jackpot-amount { 
            font-size: clamp(40px, 8vw, 70px); font-weight: 900; 
            color: #fff; text-shadow: 0 0 20px #ff0000; font-family: 'Courier New', monospace;
        }

        /* --- 5. LIVE CHAT POJOK KANAN BAWAH --- */
        .live-chat-fixed {
            position: fixed; bottom: 25px; right: 25px; z-index: 9999;
            display: flex; align-items: center; gap: 12px; text-decoration: none;
        }
        .live-chat-img {
            width: 60px; height: 60px; filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.8));
            animation: pulseChat 2s infinite;
        }
        .live-chat-btn {
            background: linear-gradient(to bottom, #fff1a8, #ffd700); color: #000;
            padding: 10px 22px; border-radius: 50px; font-weight: bold; font-size: 14px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4); display: flex; align-items: center; gap: 8px;
            border: 1px solid #c99600;
        }
        .dot-online { color: #00ff00; font-size: 18px; animation: blinker 1s infinite; }

        /* --- ANIMASI --- */
        @keyframes pulseChat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

<header class="topbar">
    <a href="#" class="brand"><img src="https://i.postimg.cc/3rtNZ7KN/Your-paragraph-text.gif" alt="Logo ClickBaddie"></a>
    <div class="top-actions">
        <a href="#" class="btn-top btn-masuk">MASUK</a>
        <a href="#" class="btn-top btn-daftar">DAFTAR</a>
    </div>
</header>

<div class="slider-container">
    <div class="slides" id="slider">
        <div class="slide"><img src="https://i.postimg.cc/N0fkSdvr/Gemini-Generated-Image-jrpjhvjrpjhvjrpj.png"></div>
        <div class="slide"><img src="https://i.postimg.cc/7L7gJj4L/Gemini-Generated-Image-agqaxqagqaxqagqa.png"></div>
        <div class="slide"><img src="https://i.postimg.cc/mgTDyq7g/Gemini-Generated-Image-38c6vs38c6vs38c6.png"></div>
    </div>
    <button class="prev" onclick="moveSlide(-1)">&#10094;</button>
    <button class="next" onclick="moveSlide(1)">&#10095;</button>
</div>

<nav class="navbar">
    <div class="nav-menu">
        <a href="#" class="nav-item"><i class="fas fa-home"></i><span>Beranda</span></a>
        <a href="#" class="nav-item"><i class="fas fa-fire"></i><span>Hot Games</span></a>
        <a href="#" class="nav-item"><i class="fas fa-gamepad"></i><span>Slot</span></a>
        <a href="#" class="nav-item"><i class="fas fa-futbol"></i><span>Sport</span></a>
        <a href="#" class="nav-item"><i class="fas fa-crown"></i><span>Casino</span></a>
        <a href="#" class="nav-item"><i class="fas fa-fish"></i><span>Fishing</span></a>
        <a href="#" class="nav-item"><i class="fas fa-rocket"></i><span>Crash</span></a>
        <a href="#" class="nav-item"><i class="fas fa-gift"></i><span>Promosi</span></a>
    </div>
</nav>

<div class="jackpot-wrap">
    <div class="jackpot-title">PROGRESSIVE JACKPOT</div>
    <div class="jackpot-amount" id="jackpot-counter">6.091.718.406</div>
</div>

<a href="https://direct.lc.chat/1351372" target="_blank" class="live-chat-fixed">
    <img src="https://i.postimg.cc/WpCT54Jk/download.png" class="live-chat-img" alt="Chat Ikon">
    <div class="live-chat-btn">
        <span class="dot-online">●</span> LIVE CHAT
    </div>
</a>

<script>
    // Slider Logic
    let currentSlide = 0;
    const slides = document.getElementById('slider');
    function moveSlide(step) {
        currentSlide = (currentSlide + step + 3) % 3;
        slides.style.transform = `translateX(-${currentSlide * 100}%)`;
    }
    setInterval(() => moveSlide(1), 4500);

    // Jackpot Counter Logic
    let val = 6091718406;
    setInterval(() => {
        val += Math.floor(Math.random() * 2500);
        document.getElementById("jackpot-counter").innerText = val.toLocaleString('id-ID');
    }, 1500);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLICKBADDIE - MANUAL UPLOAD EDITION</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; font-family: 'Arial', sans-serif; 
            background: radial-gradient(circle at top, #3a0000 0%, #1a0000 30%, #000 100%);
            color: #fff; overflow-x: hidden;
        }

        /* TOPBAR: BRAND & TOMBOL */
        .topbar {
            background: linear-gradient(to bottom, #2a0000, #4d0000, #2a0000);
            border-bottom: 2px solid gold;
            padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }
        .brand { color: gold; font-weight: bold; font-size: 24px; text-shadow: 0 0 10px gold; text-transform: uppercase; text-decoration: none; }
        .btn-top { padding: 8px 15px; border-radius: 4px; font-weight: bold; font-size: 11px; text-decoration: none; }
        .btn-masuk { background: #1a1a1a; color: gold; border: 1px solid gold; margin-right: 5px; }
        .btn-daftar { background: linear-gradient(to bottom, #ffd700, #c99600); color: #111; border: none; }

        /* SLIDER AREA */
        .slider-container {
            max-width: 1000px; margin: 15px auto;
            position: relative; overflow: hidden;
            border: 2px solid #ff0000; border-radius: 10px;
            height: 300px; 
        }
        .slides { display: flex; height: 100%; transition: 0.5s; }
        .slide { min-width: 100%; height: 100%; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }

        /* MENU IKON */
        .navbar { background: #111; padding: 10px 0; border-bottom: 2px solid #ff0000; }
        .nav-menu { list-style: none; padding: 0; margin: 0; display: flex; justify-content: center; gap: 15px; }
        .nav-item { text-align: center; color: #fff; text-decoration: none; font-size: 10px; width: 60px; }
        .nav-item i { display: block; font-size: 20px; color: #ff0000; margin-bottom: 3px; }

        /* JACKPOT & NAGA MANUAL */
        .jackpot-wrap {
            max-width: 800px; margin: 50px auto;
            position: relative; background: rgba(0,0,0,0.9);
            border-top: 3px solid #ff0000; border-bottom: 3px solid #ff0000;
            padding: 30px; text-align: center;
            box-shadow: 0 0 20px #ff0000;
        }
        
        /* INI CARA PANGGIL NAGA YANG KAMU UPLOAD */
        .dragon {
            position: absolute; width: 150px; height: auto;
            z-index: 100; top: -50px;
            animation: move 2s infinite alternate ease-in-out;
        }
        .dragon-left { left: -80px; transform: scaleX(-1); }
        .dragon-right { right: -80px; }
        @keyframes move { from { transform: translateY(0); } to { transform: translateY(-15px); } }

        .jackpot-amount { font-size: 40px; font-weight: 900; color: #fff; text-shadow: 0 0 15px #ff0000; font-family: monospace; }
    </style>
</head>
<body>

<header class="topbar">
    <a href="#" class="brand">CLICKBADDIE</a>
    <div>
        <a href="#" class="btn-top btn-masuk">MASUK</a>
        <a href="#" class="btn-top btn-daftar">DAFTAR</a>
    </div>
</header>

<div class="slider-container">
    <div class="slides" id="slider">
        <div class="slide"><img src="banner1.jpg"></div>
        <div class="slide"><img src="https://via.placeholder.com/1000x300/200000/ffffff?text=BANNER+2"></div>
    </div>
</div>

<nav class="navbar">
    <div class="nav-menu">
        <a href="#" class="nav-item"><i class="fas fa-home"></i><span>BERANDA</span></a>
        <a href="#" class="nav-item"><i class="fas fa-gamepad"></i><span>SLOT</span></a>
        <a href="#" class="nav-item"><i class="fas fa-crown"></i><span>CASINO</span></a>
        <a href="#" class="nav-item"><i class="fas fa-gift"></i><span>PROMOSI</span></a>
    </div>
</nav>

<div class="jackpot-wrap">
    <img src="naga.png" class="dragon dragon-left">
    <img src="naga.png" class="dragon dragon-right">
    
    <div style="color: #ff0000; font-weight: bold; letter-spacing: 3px;">PROGRESSIVE JACKPOT</div>
    <div class="jackpot-amount" id="jackpot-counter">6.091.718.406</div>
</div>

<script>
    let currentSlide = 0;
    setInterval(() => {
        currentSlide = (currentSlide + 1) % 2;
        document.getElementById('slider').style.transform = `translateX(-${currentSlide * 100}%)`;
    }, 4000);

    let val = 6091718406;
    setInterval(() => {
        val += Math.floor(Math.random() * 2000);
        document.getElementById("jackpot-counter").innerText = val.toLocaleString('id-ID');
    }, 1500);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLICKBADDIE - SLIDER & MENU</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; font-family: Arial, sans-serif; 
            background: radial-gradient(circle at top, #3a0000 0%, #1a0000 22%, #000 100%);
            color: #fff; overflow-x: hidden;
        }

        /* NAVBAR MENU (KOTAK MERAH ATAS) */
        .navbar {
            background: linear-gradient(to bottom, #4a0000, #000);
            border-bottom: 2px solid #ff0000;
            padding: 10px 0;
            text-align: center;
        }
        .nav-menu {
            list-style: none; padding: 0; margin: 0;
            display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;
        }
        .nav-menu a {
            color: #fff; text-decoration: none; font-size: 13px; font-weight: bold;
            text-transform: uppercase; transition: 0.3s;
        }
        .nav-menu a:hover { color: #ff0000; text-shadow: 0 0 10px #ff0000; }

        /* SLIDER BOX (KOTAK MERAH TENGAH) */
        .slider-container {
            max-width: 1000px; margin: 20px auto;
            position: relative; overflow: hidden;
            border: 2px solid #ff0000; border-radius: 15px;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.4);
        }
        .slides { display: flex; transition: transform 0.5s ease-in-out; }
        .slide { min-width: 100%; position: relative; }
        .slide img { width: 100%; display: block; filter: brightness(0.7); }
        
        /* Tombol Geser Slider */
        .prev, .next {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255, 0, 0, 0.6); color: white; border: none;
            padding: 15px; cursor: pointer; border-radius: 50%; font-weight: bold;
        }
        .next { right: 10px; } .prev { left: 10px; }

        /* JACKPOT SECTION */
        .jackpot {
            max-width: 700px; margin: 30px auto;
            border: 3px solid #ff0000; border-radius: 50px;
            padding: 20px; background: rgba(0,0,0,0.9);
            text-align: center; box-shadow: 0 0 30px #ff0000;
            animation: pulse 1s infinite alternate;
        }
        .jackpot-amount { font-size: 50px; color: #fff; font-weight: 900; text-shadow: 0 0 20px #ff0000; }
        
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.02); } }

        /* PROVIDER GRID */
        .provider-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px; width: 90%; margin: 20px auto;
        }
        .p-item { background: #111; border: 1px solid #ff0000; padding: 15px; border-radius: 8px; text-align: center; color: #ff0000; font-weight: bold; font-size: 12px; }

        .live-chat { 
            position: fixed; bottom: 20px; right: 20px; 
            background: #ff0000; color: #fff; padding: 15px 30px; 
            border-radius: 50px; font-weight: bold; text-decoration: none; 
            box-shadow: 0 0 20px #ff0000;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <ul class="nav-menu">
        <li><a href="#">Beranda</a></li>
        <li><a href="#">Promosi</a></li>
        <li><a href="#">Mini Games</a></li>
        <li><a href="#">LIVESCORE</a></li>
        <li><a href="#">Kontak</a></li>
        <li><a href="#">Tournament</a></li>
        <li><a href="#">Lebih Banyak</a></li>
    </ul>
</nav>

<div class="slider-container">
    <div class="slides" id="slider">
        <div class="slide">
            <img src="https://via.placeholder.com/1000x400/200000/ff0000?text=BONUS+NEW+MEMBER+100%">
        </div>
        <div class="slide">
            <img src="https://via.placeholder.com/1000x400/100000/ffffff?text=EVENT+JACKPOT+MINGGUAN">
        </div>
        <div class="slide">
            <img src="https://via.placeholder.com/1000x400/300000/ff0000?text=DEPOSIT+PULSA+TANPA+POTONGAN">
        </div>
    </div>
    <button class="prev" onclick="moveSlide(-1)">&#10094;</button>
    <button class="next" onclick="moveSlide(1)">&#10095;</button>
</div>

<div class="jackpot">
    <div style="color: #ff0000; font-weight: bold; letter-spacing: 3px;">PROGRESSIVE JACKPOT</div>
    <div class="jackpot-amount" id="jackpot-counter">6.088.558.225</div>
</div>

<div class="provider-grid">
    <div class="p-item">PG SOFT</div>
    <div class="p-item">PRAGMATIC</div>
    <div class="p-item">JOKER</div>
    <div class="p-item">MICROGAMING</div>
    <div class="p-item">CQ9</div>
    <div class="p-item">Habanero</div>
</div>

<a href="#" class="live-chat">💬 Live Chat</a>

<script>
    // Script SLIDER
    let currentSlide = 0;
    const slides = document.getElementById('slider');
    const totalSlides = 3;

    function moveSlide(step) {
        currentSlide = (currentSlide + step + totalSlides) % totalSlides;
        slides.style.transform = `translateX(-${currentSlide * 100}%)`;
    }

    // Auto jalan setiap 5 detik
    setInterval(() => moveSlide(1), 5000);

    // Script JACKPOT
    let val = 6088558225;
    setInterval(() => {
        val += Math.floor(Math.random() * 1200);
        document.getElementById("jackpot-counter").innerText = val.toLocaleString('id-ID');
    }, 1500);
</script>

</body>
</html>

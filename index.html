            padding: 120px 20px;

        .jackpot-container {

            font-weight: bold; 
            letter-spacing: 5px;

            border-radius: 8px; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 20px; 
            margin: 10px; 
            display: inline-block; 
            transition: 0.3s; 
        }
        .btn-daftar { 
            background: linear-gradient(to bottom, #ffd700, #b8860b); 
            color: #000; 
            box-shadow: 0 0 15px gold; 
        }
        .btn-login { 
            background: #222; 
            color: gold; 
            border: 1px solid gold; 
        }
        .btn:hover { transform: translateY(-5px); filter: brightness(1.2); }

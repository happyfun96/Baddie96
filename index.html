<!DOCTYPE html>

<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CLICKBADDIE - THE REAL DRAGON SULTAN</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>

        * { box-sizing: border-box; }

        body { 

            margin: 0; font-family: 'Arial', sans-serif; 

            background: radial-gradient(circle at top, #3a0000 0%, #1a0000 30%, #000 100%);

            color: #fff; overflow-x: hidden;

        }



        /* 1. TOPBAR (BRAND & TOMBOL SEPERTI GAMBAR) */

        .topbar {

            background: linear-gradient(to bottom, #2a0000, #4d0000, #2a0000);

            border-bottom: 2px solid gold;

            padding: 10px 50px;

            display: flex; justify-content: space-between; align-items: center;

            position: sticky; top: 0; z-index: 1000;

        }

        .brand { 

            color: gold; font-weight: bold; font-size: 28px; 

            text-shadow: 0 0 15px gold, 0 0 5px #ff0000; letter-spacing: 2px;

            text-transform: uppercase; text-decoration: none;

        }

        .top-actions { display: flex; gap: 10px; }

        .btn-top { 

            padding: 8px 18px; border-radius: 4px; font-weight: bold; 

            font-size: 12px; text-transform: uppercase; text-decoration: none;

            transition: 0.3s;

        }

        .btn-masuk { background: #1a1a1a; color: gold; border: 1px solid gold; }

        .btn-masuk:hover { background: gold; color: #000; box-shadow: 0 0 10px gold; }

        .btn-daftar { 

            background: linear-gradient(to bottom, #fff1a8, #ffd700, #c99600); 

            color: #111; box-shadow: 0 0 12px rgba(255, 215, 0, 0.7); border: none;

        }

        .btn-daftar:hover { transform: scale(1.05); }



        /* 2. SLIDER UTAMA */

        .slider-container {

            max-width: 1100px; margin: 20px auto;

            position: relative; overflow: hidden;

            border: 2px solid #ff0000; border-radius: 15px;

            box-shadow: 0 0 25px rgba(255, 0, 0, 0.5);

            height: 380px; 

        }

        .slides { display: flex; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }

        .slide { min-width: 100%; height: 100%; position: relative; }

        .slide img { width: 100%; height: 100%; object-fit: cover; display: block; filter: brightness(0.8); }

        

        .prev, .next {

            position: absolute; top: 50%; transform: translateY(-50%);

            background: rgba(255, 0, 0, 0.7); color: white; border: none;

            width: 45px; height: 45px; cursor: pointer; border-radius: 50%; 

            font-weight: bold; z-index: 100; transition: 0.3s;

        }

        .next { right: 15px; } .prev { left: 15px; }



        /* 3. NAVBAR MENU IKON */

        .navbar { background: #111; padding: 15px 0; border-bottom: 2px solid #ff0000; }

        .nav-menu {

            list-style: none; padding: 0; margin: 0;

            display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;

        }

        .nav-item { text-align: center; color: #fff; text-decoration: none; transition: 0.3s; width: 85px; }

        .nav-item i { display: block; font-size: 26px; color: #ff0000; margin-bottom: 5px; text-shadow: 0 0 12px #ff0000; }

        .nav-item span { font-size: 11px; font-weight: bold; text-transform: uppercase; display: block; }

        .nav-item:hover { transform: translateY(-5px); }

        .nav-item:hover i { color: gold; text-shadow: 0 0 15px gold; }



        /* 4. KOTAK JACKPOT DENGAN NAGA REALISTIK */

        .jackpot-wrap {

            max-width: 850px; margin: 80px auto 40px;

            position: relative;

            background: rgba(0,0,0,0.9);

            border-top: 3px solid #ff0000; border-bottom: 3px solid #ff0000;

            padding: 35px; text-align: center;

            box-shadow: inset 0 0 50px #440000, 0 0 30px #ff0000;

        }

        

        /* Gambar Naga Realistik HD */

        .dragon {

            position: absolute; width: 220px; height: 200px;

            filter: drop-shadow(0 0 15px #ff0000);

            z-index: 100;

            background-size: contain; background-repeat: no-repeat; background-position: center;

            animation: dragonFloat 2.5s infinite alternate ease-in-out;

        }

        .dragon-left { 

            top: -60px; left: -120px; transform: scaleX(-1); 

            background-image: url('https://www.pngmart.com/files/16/Red-Dragon-Transparent-Background.png');

        }

        .dragon-right { 

            top: -60px; right: -120px; 

            background-image: url('https://www.pngmart.com/files/16/Red-Dragon-Transparent-Background.png');

        }



        @keyframes dragonFloat { from { transform: translateY(0); } to { transform: translateY(-20px); } }



        .jackpot-amount { 

            font-size: clamp(35px, 10vw, 65px); font-weight: 900; 

            color: #fff; text-shadow: 0 0 25px #ff0000; 

            font-family: 'Courier New', monospace; display: block; margin-top: 15px;

        }



        /* LIVE CHAT */

        .live-chat { 

            position: fixed; bottom: 30px; right: 30px; 

            background: linear-gradient(to bottom, #fff1a8, #ffd700); 

            color: #111; padding: 18px 35px; border-radius: 50px; 

            font-weight: bold; text-decoration: none; 

            box-shadow: 0 10px 25px rgba(255, 215, 0, 0.6); z-index: 9999;

            animation: pulseChat 1.2s infinite;

        }

        @keyframes pulseChat { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

    </style>

</head>

</header>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITUS MERAH MERONA</title>
    <style>
        /* BASE STYLE */
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Arial', sans-serif; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
        }

        /* HEADER MERAH */
        header { 
            background: linear-gradient(to bottom, #2a0000, #000); 
            padding: 15px 50px; 
            border-bottom: 2px solid #ff0000; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .logo { 
            color: #ff0000; 
            font-weight: bold; 
            font-size: 28px; 
            text-shadow: 0 0 15px #ff0000; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* BANNER UTAMA MERAH HITAM */
        .hero { 
            background: radial-gradient(circle, #440000 0%, #000 100%);
            padding: 120px 20px; 
            text-align: center; 
            border-bottom: 3px solid #ff0000; 
        }
        
        /* BOX JACKPOT MERAH GLOW */
        .jackpot-container { 
            margin: -60px auto 30px; 
            width: 90%; 
            max-width: 700px; 
            background: rgba(0,0,0,0.95); 
            border: 3px solid #ff0000; 
            border-radius: 50px; 
            padding: 25px; 
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.6); 
            text-align: center; 
        }
        .jackpot-title { 
            color: #ff0000; 
            font-weight: bold; 
            letter-spacing: 5px; 
            font-size: 20px; 
            margin-bottom: 10px; 
        }
        .jackpot-amount { 
            font-size: clamp(30px, 8vw, 60px); 
            font-weight: 900; 
            color: #fff; 
            margin: 0; 
            text-shadow: 0 0 20px #ff0000; 
            font-family: 'Courier New', Courier, monospace;
        }

        /* TOMBOL MERAH SEXY */
        .btn-box { margin: 30px 0; }
        .btn { 
            padding: 15px 45px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 20px; 
            margin: 10px; 
            display: inline-block; 
            transition: 0.3s; 
        }
        .btn-daftar { 
            background: linear-gradient(to bottom, #ff0000, #8b0000); 
            color: #fff; 
            box-shadow: 0 0 15px #ff0000; 
            border: none;
        }
        .btn-login { 
            background: #222; 
            color: #ff0000; 
            border: 1px solid #ff0000; 
        }
        .btn:hover { transform: translateY(-5px); filter: brightness(1.2); }

        /* FLOATING CHAT MERAH */
        .live-chat { 
            position: fixed; 
            bottom: 30px; 
            right: 30px; 
            background: #ff0000; 
            color: #fff; 
            padding: 18px 30px; 
            border-radius: 50px; 
            font-weight: bold; 
            text-decoration: none; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); 
            z-index: 1000;
            font-size: 18px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">CLICKBADDIE</div>
    <div style="color: #ff0000; font-size: 14px;">SITUS RESMI DAN TERPERCAYA</div>
</header>

<div class="hero">
    <h2 style="color: #ff0000; margin: 0; letter-spacing: 2px; font-size: 24px;">SITUS TERPERCAYA DENGAN</h2>
    <h1 style="font-size: clamp(30px, 8vw, 55px); margin: 10px 0; text-shadow: 2px 2px 10px #000;">BONUS TERBADASS</h1>
    
    <div class="btn-box">
        <a href="#" class="btn btn-login">LOGIN</a>
        <a href="#" class="btn btn-daftar">DAFTAR</a>
    </div>
</div>

<div class="jackpot-container">
    <div class="jackpot-title">PROGRESSIVE JACKPOT</div>
    <div class="jackpot-amount" id="jackpot-counter">6.091.718.406</div>
</div>

<a href="#" class="live-chat">💬 Live Chat Merah</a>

<script>
    // SCRIPT ANGKA GERAK (JACKPOT)
    let startVal = 6091718406;
    function updateJackpot() {
        startVal += Math.floor(Math.random() * 1500); 
        document.getElementById("jackpot-counter").innerText = startVal.toLocaleString('id-ID');
    }
    setInterval(updateJackpot, 1500); 
</script>

</body>
</html>

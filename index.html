<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLICKBADDIE - REBORN</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; font-family: 'Arial', sans-serif; 
            background: radial-gradient(circle at top, #3a0000 0%, #1a0000 30%, #000 100%);
            color: #fff; overflow-x: hidden;
        }

        /* NAVBAR MENU (KOTAK ATAS) */
        .navbar {
            background: linear-gradient(to bottom, #4a0000, #000);
            border-bottom: 2px solid #ff0000;
            padding: 15px 0;
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-menu {
            list-style: none; padding: 0; margin: 0;
            display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;
        }
        .nav-menu a {
            color: #fff; text-decoration: none; font-size: 12px; font-weight: bold;
            text-transform: uppercase; transition: 0.3s;
        }
        .nav-menu a:hover { color: #ff0000; text-shadow: 0 0 10px #ff0000; }

        /* SLIDER BOX (PERBAIKAN TINGGI) */
        .slider-container {
            max-width: 1000px; margin: 30px auto;
            position: relative; overflow: hidden;
            border: 2px solid #ff0000; border-radius: 15px;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.5);
            /* Mengunci tinggi agar tidak gepeng */
            height: 350px; 
        }
        .slides { 
            display: flex; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .slide { min-width: 100%; height: 100%; position: relative; }
        .slide img { 
            width: 100%; height: 100%; object-fit: cover; 
            display: block; filter: brightness(0.8); 
        }
        
        /* Navigasi Panah */
        .prev, .next {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255, 0, 0, 0.7); color: white; border: none;
            width: 45px; height: 45px; cursor: pointer; border-radius: 50%; 
            font-weight: bold; z-index: 100; transition: 0.3s;
        }
        .next { right: 15px; } .prev { left: 15px; }
        .prev:hover, .next:hover { background: #fff; color: #ff0000; }

        /* JACKPOT SECTION */
        .jackpot-wrap { padding: 0 20px; }
        .jackpot {
            max-width: 700px; margin: 20px auto;
            border: 3px solid #ff0000; border-radius: 60px;
            padding: 25px; background: rgba(0,0,0,0.9);
            text-align: center; box-shadow: 0 0 35px #ff0000;
            animation: jackpotPulse 1.5s infinite alternate;
        }
        @keyframes jackpotPulse { from { transform: scale(1); } to { transform: scale(1.03); } }
        
        .jackpot-amount { 
            font-size: clamp(30px, 10vw, 55px); 
            color: #fff; font-weight: 900; 
            text-shadow: 0 0 20px #ff0000; 
            font-family: 'Courier New', monospace;
        }

        /* PROVIDER GRID */
        .provider-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px; width: 90%; max-width: 1100px; margin: 40px auto;
        }
        .p-item { 
            background: #111; border: 1px solid #ff0000; 
            padding: 15px; border-radius: 10px; text-align: center; 
            color: #ff0000; font-weight: bold; font-size: 13px; 
            transition: 0.3s; cursor: pointer;
        }
        .p-item:hover { background: #ff0000; color: #fff; box-shadow: 0 0 15px #ff0000; }

        .live-chat { 
            position: fixed; bottom: 25px; right: 25px; 
            background: #ff0000; color: #fff; padding: 15px 35px; 
            border-radius: 50px; font-weight: bold; text-decoration: none; 
            box-shadow: 0 0 20px #ff0000; z-index: 9999;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <ul class="nav-menu">
        <li><a href="#">Beranda</a></li>
        <li><a href="#">Promosi</a></li>
        <li><a href="#">Mini Games</a></li>
        <li><a href="#">LIVESCORE</a></li>
        <li><a href="#">Kontak</a></li>
        <li><a href="#">Tournament</a></li>
        <li><a href="#">Lebih Banyak</a></li>
    </ul>
</nav>

<div class="slider-container">
    <div class="slides" id="slider">
        <div class="slide">
            <img src="https://placehold.jp/40/8b0000/ffffff/1000x400.png?text=PROMO+NEW+MEMBER+100%">
        </div>
        <div class="slide">
            <img src="https://placehold.jp/40/4a0000/ffffff/1000x400.png?text=BONUS+DEPOSIT+HARIAN">
        </div>
        <div class="slide">
            <img src="https://placehold.jp/40/000000/ff0000/1000x400.png?text=EVENT+JACKPOT+BADDIE">
        </div>
    </div>
    <button class="prev" onclick="moveSlide(-1)">&#10094;</button>
    <button class="next" onclick="moveSlide(1)">&#10095;</button>
</div>

<div class="jackpot-wrap">
    <div class="jackpot">
        <div style="color: #ff0000; font-weight: bold; letter-spacing: 5px; margin-bottom: 10px;">PROGRESSIVE JACKPOT</div>
        <div class="jackpot-amount" id="jackpot-counter">6.088.558.745</div>
    </div>
</div>

<div class="provider-grid">
    <div class="p-item">PG SOFT</div>
    <div class="p-item">PRAGMATIC</div>
    <div class="p-item">JOKER</div>
    <div class="p-item">MICROGAMING</div>
    <div class="p-item">CQ9</div>
    <div class="p-item">HABANERO</div>
</div>

<a href="#" class="live-chat">💬 Live Chat</a>

<script>
    let currentSlide = 0;
    const slides = document.getElementById('slider');
    const totalSlides = 3;

    function moveSlide(step) {
        currentSlide = (currentSlide + step + totalSlides) % totalSlides;
        slides.style.transform = `translateX(-${currentSlide * 100}%)`;
    }

    // Auto geser tiap 4 detik
    setInterval(() => moveSlide(1), 4000);

    // Jackpot counter
    let val = 6088558745;
    setInterval(() => {
        val += Math.floor(Math.random() * 1800);
        document.getElementById("jackpot-counter").innerText = val.toLocaleString('id-ID');
    }, 1500);
</script>

</body>
</html>
